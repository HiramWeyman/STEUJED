<form>
    <div class="row">
      <div class="col">
        <input type="file" 
        (change)="onFileChange($event);"
        multiple="false" 
        class="form-control"/>
      </div>
      <div [hidden]="!loading2">
        <i  class="fa fa-cog fa-spin fa-3x fa-fw" ></i>
            <span class="sr-only">Cargando...</span>
      </div>
      <div class="col">
        <button type="button" (click)="asignar()"  [disabled] = "btnDisabled"  class="btn btn-primary btn-lg">Guardar Información </button>
      </div>
      <div class="col">
        <button type="button" (click)="borrar()"    class="btn btn-danger btn-lg">Borrar Archivo </button>
      </div>
      <div class="col" *ngIf="loading">
        <i  class="fa fa-cog fa-spin fa-3x fa-fw" ></i>
      </div>
    </div><br><br>
    <div id="titulo"><h2>{{titulo}}</h2></div>
    <div *ngIf="titulo!=null">
        <table id="customers" >
            <tbody>    
               <tr *ngFor="let row of data">
                
                    <td *ngFor="let val of row">
                        {{val}}
                    </td>
                </tr>
            </tbody>
        </table>    
           
    </div>
  </form>
